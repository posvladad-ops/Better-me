<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Better Me">
    <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><rect width='180' height='180' rx='38' fill='%23F5F3EF' stroke='%231B1B1B' stroke-width='3'/><text x='90' y='122' font-family='Georgia,serif' font-size='90' font-weight='400' fill='%231B1B1B' text-anchor='middle'>BS</text></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><rect width='32' height='32' rx='8' fill='%23F5F3EF' stroke='%231B1B1B' stroke-width='2'/><text x='16' y='23' font-family='Georgia,serif' font-size='16' font-weight='400' fill='%231B1B1B' text-anchor='middle'>BS</text></svg>">
    <meta name="theme-color" content="#F5F3EF">
    <title>Better Me</title>
    <style>
        :root {
            --bg: #FAFAF8;
            --card: #FFFFFF;
            --text: #37352F;
            --text-light: #9B9A97;
            --text-muted: #C1C0BD;
            --border: #EDECE9;
            --gold: #C9B99A;
            --win: #4A7C59;
            --lose: #B06A6A;
            --radius: 10px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.2px;
            overflow-x: hidden;
        }
        input, textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
            -webkit-touch-callout: default !important;
        }
        .app {
            max-width: 420px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 20px;
        }

        /* Slide Panel */
        .panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(27,25,22,0);
            z-index: 200;
            pointer-events: none;
            transition: background 0.35s ease;
        }
        .panel-overlay.show {
            background: rgba(27,25,22,0.55);
            pointer-events: all;
        }
        .slide-panel {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100%;
            background: #FFFEFB;
            z-index: 210;
            box-shadow: -4px 0 30px rgba(0,0,0,0.12);
            transition: right 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            padding: env(safe-area-inset-top) 20px 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .slide-panel.show {
            right: 0;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header span {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }
        .panel-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-family: inherit;
        }
        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .section-title {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }
        .panel-btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 12px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            color: var(--text);
        }
        .panel-btn:active {
            background: #F3F0E9;
        }
        .panel-btn.danger {
            color: #B06A6A;
            border-color: #E8D5D5;
        }

        /* Calendar Modal */
        .cal-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(27,25,22,0.7);
            z-index: 250;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .cal-modal.show {
            opacity: 1;
            pointer-events: all;
        }
        .cal-modal-card {
            background: #FFFEFB;
            border-radius: 20px;
            padding: 20px 16px;
            margin: 16px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            max-height: 80vh;
            overflow-y: auto;
        }
        .cal-month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 16px;
            color: var(--text);
        }
        .cal-month-header button {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 16px;
            cursor: pointer;
            color: var(--text);
            font-family: inherit;
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .cal-dow {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 0;
        }
        .cal-cell {
            aspect-ratio: 1;
            border-radius: 8px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            border: 1px solid transparent;
            color: var(--text);
        }
        .cal-cell.today {
            border-color: var(--text-light);
            font-weight: 600;
        }
        .cal-cell.done {
            background: #F3F0E9;
            border-color: var(--gold);
            color: #5B4C38;
        }
        .cal-cell.missed {
            background: #F9F3F3;
            border-color: #E8D5D5;
            color: #8B5555;
        }
        .cal-cell.other-month {
            color: #D5D3CF;
        }
        .cal-close {
            display: block;
            margin: 16px auto 0;
            padding: 8px 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }

        /* Motivation Modal */
        .motive-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(27,25,22,0.85);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .motive-modal.show {
            opacity: 1;
            pointer-events: all;
        }
        .motive-card {
            background: #FFFEFB;
            border-radius: 20px;
            padding: 32px 24px;
            margin: 24px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 16px 60px rgba(0,0,0,0.25);
            transform: translateY(30px);
            transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .motive-modal.show .motive-card {
            transform: translateY(0);
        }
        .motive-emoji {
            font-size: 60px;
            line-height: 1;
            margin-bottom: 16px;
        }
        .motive-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9B9A97;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .motive-quote {
            font-size: 16px;
            color: #37352F;
            line-height: 1.5;
            letter-spacing: -0.2px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .motive-sub {
            font-size: 12px;
            color: #9B9A97;
            letter-spacing: 0.3px;
            font-style: italic;
        }
        .motive-btn {
            margin-top: 20px;
            padding: 12px 32px;
            border-radius: 25px;
            border: 1.5px solid #C9B99A;
            background: #F5F3EF;
            color: #37352F;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0 2px;
        }
        .header .titles {
            flex: 1;
        }
        .header .title {
            font-size: 19px;
            font-weight: 600;
            color: var(--text);
        }
        .header .subtitle {
            font-size: 10px;
            color: var(--text-light);
        }
        .menu-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        /* Game */
        .game-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 12px 14px;
        }
        .game-score-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .game-score {
            flex: 1;
            text-align: center;
            padding: 8px 6px;
            border-radius: 7px;
            background: #FAFAF8;
            border: 1px solid var(--border);
        }
        .game-score.win-score {
            background: #F6F9F7;
            border-color: #D5E5DC;
        }
        .game-score.lose-score {
            background: #FBF7F7;
            border-color: #E8D5D5;
        }
        .game-score .g-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-light);
        }
        .game-score .g-val {
            font-size: 24px;
            font-weight: 600;
        }
        .win-score .g-val {
            color: var(--win);
        }
        .lose-score .g-val {
            color: var(--lose);
        }
        .game-progress {
            height: 3px;
            background: #EDECE9;
            border-radius: 2px;
            margin-bottom: 8px;
            overflow: hidden;
            display: flex;
        }
        .game-progress .win-fill {
            background: var(--gold);
            height: 100%;
            transition: width 0.4s ease;
        }
        .game-progress .lose-fill {
            background: #E8D5D5;
            height: 100%;
            transition: width 0.4s ease;
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .game-input-row {
            display: flex;
            gap: 5px;
            margin-bottom: 6px;
        }
        .game-input-row input {
            flex: 1;
            padding: 7px 9px;
            border-radius: 5px;
            border: 1px solid var(--border);
            font-size: 11px;
            background: #FAFAF8;
            color: var(--text);
            outline: none;
            font-family: inherit;
        }
        .game-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .game-btn {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid var(--border);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
            background: var(--card);
            color: var(--text);
        }
        .game-btn:active {
            transform: scale(0.97);
        }
        .game-btn.win-btn {
            background: #F6F9F7;
            border-color: #C5DCD0;
            color: #3D6B57;
        }
        .game-btn.lose-btn {
            background: #FBF7F7;
            border-color: #E5CCCC;
            color: #8B5555;
        }

        /* Ring + Mini Calendar */
        .top-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .ring-container {
            position: relative;
            width: 70px;
            height: 70px;
            flex-shrink: 0;
        }
        .ring-svg {
            width: 70px;
            height: 70px;
            transform: rotate(-90deg);
        }
        .ring-bg {
            fill: none;
            stroke: #EDECE9;
            stroke-width: 5;
        }
        .ring-fill {
            fill: none;
            stroke: var(--gold);
            stroke-width: 5;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        .ring-fill.complete {
            stroke: var(--win);
        }
        .ring-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }
        .mini-cal {
            flex: 1;
            display: flex;
            gap: 3px;
            overflow-x: auto;
            min-width: 0;
        }
        .mini-day {
            min-width: 30px;
            height: 38px;
            border-radius: 5px;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: var(--text-muted);
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.15s;
        }
        .mini-day:active {
            transform: scale(0.93);
        }
        .mini-day.selected {
            border-color: var(--text);
            border-width: 2px;
            font-weight: 600;
        }
        .mini-day.today {
            border-color: var(--text-light);
        }
        .mini-day.done {
            background: #F3F0E9;
            border-color: var(--gold);
        }
        .mini-day.done::after {
            content: '◆';
            font-size: 8px;
            color: var(--gold);
        }
        .mini-day.missed {
            background: #F9F3F3;
            border-color: #E8D5D5;
        }
        .mini-day.missed::after {
            content: '◇';
            font-size: 8px;
            color: var(--lose);
        }

        /* Chain */
        .chain-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .chain-header {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chain-header h3 {
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
        }
        .chain-status {
            font-size: 10px;
            font-weight: 500;
        }
        .chain-status.incomplete {
            color: #B06A6A;
        }
        .chain-status.complete {
            color: var(--win);
        }
        .task-list {
            padding: 4px 0;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid #F8F7F5;
            cursor: pointer;
        }
        .task-item:last-child {
            border-bottom: none;
        }
        .task-check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: transparent;
        }
        .task-check.done {
            background: var(--win);
            border-color: var(--win);
            color: #FFF;
        }
        .task-info {
            flex: 1;
            min-width: 0;
        }
        .task-name-input-edit {
            font-size: 13px;
            color: var(--text);
            border: none;
            background: transparent;
            outline: none;
            font-family: inherit;
            width: 100%;
            padding: 2px 0;
        }
        .task-time-row {
            display: flex;
            gap: 4px;
            align-items: center;
            margin-top: 2px;
        }
        .task-time-input {
            font-size: 10px;
            color: var(--text-light);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 2px 4px;
            width: 50px;
            text-align: center;
            background: #FAFAF8;
            outline: none;
            font-family: inherit;
        }
        .task-drag {
            font-size: 12px;
            color: var(--text-muted);
            cursor: grab;
            padding: 4px;
        }
        .task-delete {
            font-size: 14px;
            color: var(--text-muted);
            padding: 2px 4px;
            cursor: pointer;
        }
        .add-task-row {
            display: flex;
            gap: 5px;
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .add-task-row input {
            padding: 7px 8px;
            border-radius: 5px;
            border: 1px solid var(--border);
            font-size: 11px;
            background: #FAFAF8;
            color: var(--text);
            outline: none;
            font-family: inherit;
            min-width: 0;
        }
        .add-task-row input.task-name-input {
            flex: 2;
            min-width: 80px;
        }
        .add-task-row input.time-input {
            flex: 1;
            min-width: 45px;
            text-align: center;
        }
        .add-task-row button {
            padding: 7px 10px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            white-space: nowrap;
        }
        .chain-actions {
            display: flex;
            gap: 5px;
            padding: 6px 12px 8px;
            flex-wrap: wrap;
        }
        .chain-actions button {
            font-size: 9px;
            color: var(--text-light);
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-family: inherit;
        }
        .chain-actions button:active {
            background: #F3F0E9;
        }

        /* Stats */
        .stats-row {
            display: flex;
            gap: 6px;
        }
        .stat-mini {
            flex: 1;
            background: var(--card);
            border-radius: var(--radius);
            padding: 8px 10px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-mini .val {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
        }
        .stat-mini .lbl {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #37352F;
            color: #FAFAF8;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: all 0.35s ease;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="titles">
                <div class="title">the best version of myself</div>
                <div class="subtitle">tap a day to see its chain</div>
            </div>
            <button class="menu-btn" id="menuBtn">☰</button>
        </div>

        <!-- Game -->
        <div class="game-card">
            <div class="game-score-row">
                <div class="game-score win-score">
                    <div class="g-label">◆ Wins</div>
                    <div class="g-val" id="winScore">0</div>
                </div>
                <div class="game-score lose-score">
                    <div class="g-label">◇ Impulses</div>
                    <div class="g-val" id="impulseScore">0</div>
                </div>
            </div>
            <div class="game-progress">
                <div class="win-fill" id="winFill" style="width:50%;"></div>
                <div class="lose-fill" id="loseFill" style="width:50%;"></div>
            </div>
            <div class="game-info">
                <span id="gameRatio">0:0</span>
                <span>Goal: 70%</span>
            </div>
            <div class="game-input-row">
                <input type="text" id="gameInput" placeholder="What happened?" maxlength="50">
            </div>
            <div class="game-btns">
                <button class="game-btn win-btn" id="gameWinBtn">◆ I Won</button>
                <button class="game-btn lose-btn" id="gameLoseBtn">◇ Impulse</button>
            </div>
        </div>

        <!-- Ring + Mini Calendar -->
        <div class="top-row">
            <div class="ring-container">
                <svg class="ring-svg" viewBox="0 0 70 70">
                    <circle class="ring-bg" cx="35" cy="35" r="29"/>
                    <circle class="ring-fill" id="ringFill" cx="35" cy="35" r="29"
                    stroke-dasharray="182.2" stroke-dashoffset="182.2"/>
                </svg>
                <div class="ring-text" id="ringText">0%</div>
            </div>
            <div class="mini-cal" id="miniCal"></div>
        </div>

        <!-- Chain -->
        <div class="chain-card">
            <div class="chain-header">
                <h3 id="chainTitle">Today's Chain</h3>
                <span class="chain-status incomplete" id="chainStatus">incomplete</span>
            </div>
            <div class="task-list" id="taskList"></div>
            <div class="add-task-row">
                <input type="text" class="task-name-input" id="newTaskName" placeholder="task name" maxlength="50">
                <input type="text" class="time-input" id="newTaskStart" placeholder="start" maxlength="10">
                <input type="text" class="time-input" id="newTaskEnd" placeholder="end" maxlength="10">
                <button id="addTaskBtn">Add</button>
            </div>
            <div class="chain-actions">
                <button id="dupTodayBtn">↻ Dup to Today</button>
                <button id="dupTomorrowBtn">↻ Dup to Tomorrow</button>
                <button id="dupWeekBtn">↻ Dup Next 7 Days</button>
                <button id="resetDayBtn">Reset Day</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-mini"><div class="val" id="streakDays">0</div><div class="lbl">Streak</div></div>
            <div class="stat-mini"><div class="val" id="totalChains">0</div><div class="lbl">Done</div></div>
            <div class="stat-mini"><div class="val" id="totalMissed">0</div><div class="lbl">Missed</div></div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <!-- Slide Panel -->
    <div class="panel-overlay" id="panelOverlay"></div>
    <div class="slide-panel" id="slidePanel">
        <div class="panel-header">
            <span>Menu</span>
            <button class="panel-close" id="panelCloseBtn">×</button>
        </div>
        <div class="panel-section">
            <div class="section-title">Navigation</div>
            <button class="panel-btn" id="panelCalBtn">📅 Full Calendar</button>
            <button class="panel-btn" id="panelTodayBtn">📍 Go to Today</button>
        </div>
        <div class="panel-section">
            <div class="section-title">Data</div>
            <button class="panel-btn danger" id="panelResetBtn">Reset All Progress</button>
        </div>
    </div>

    <!-- Motivation Modal -->
    <div class="motive-modal" id="motiveModal">
        <div class="motive-card">
            <div class="motive-emoji" id="motiveEmoji">⚡</div>
            <div class="motive-title">Today's Trigger</div>
            <div class="motive-quote" id="motiveQuote"></div>
            <div class="motive-sub" id="motiveSub"></div>
            <button class="motive-btn" id="motiveCloseBtn">I'm Ready ✦</button>
        </div>
    </div>

    <!-- Calendar Modal -->
    <div class="cal-modal" id="calModal">
        <div class="cal-modal-card">
            <div class="cal-month-header">
                <button id="calPrevMonth">←</button>
                <span id="calMonthTitle"></span>
                <button id="calNextMonth">→</button>
            </div>
            <div class="cal-grid" id="calGrid"></div>
            <button class="cal-close" id="calCloseBtn">Close</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'better_me_clickable_v1';
        const RING_CIRC = 2 * Math.PI * 29;

        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) { try { return JSON.parse(raw); } catch (e) {} }
            return {
                wins: 0, impulses: 0, gameHistory: [],
                tasks: [
                    { id: 1, name: 'Make the bed', start: '07:00', end: '07:05' },
                    { id: 2, name: 'Drink water', start: '07:05', end: '07:10' },
                    { id: 3, name: 'Stretch', start: '07:10', end: '07:30' },
                    { id: 4, name: 'Read 10 pages', start: '20:00', end: '20:30' },
                    { id: 5, name: 'No phone', start: '22:00', end: '06:00' },
                ],
                completedDays: {},
                todayCompleted: {},
                nextId: 6,
                futureTasks: {}
            };
        }

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
        let appData = loadData();
        let viewOffset = 0;

        function getViewKey() {
            const d = new Date();
            d.setDate(d.getDate() + viewOffset);
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }
        function getTodayKey() { return getDateKey(new Date()); }
        function getDateKey(date) { return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0'); }

        const $ = (id) => document.getElementById(id);

        // DOM
        const winScoreEl = $('winScore'), impulseScoreEl = $('impulseScore'), winFill = $('winFill'), loseFill = $('loseFill');
        const gameRatio = $('gameRatio'), gameInput = $('gameInput'), gameWinBtn = $('gameWinBtn'), gameLoseBtn = $('gameLoseBtn');
        const ringFill = $('ringFill'), ringText = $('ringText'), miniCal = $('miniCal');
        const chainTitle = $('chainTitle'), chainStatus = $('chainStatus'), taskList = $('taskList');
        const newTaskName = $('newTaskName'), newTaskStart = $('newTaskStart'), newTaskEnd = $('newTaskEnd'), addTaskBtn = $('addTaskBtn');
        const dupTodayBtn = $('dupTodayBtn'), dupTomorrowBtn = $('dupTomorrowBtn'), dupWeekBtn = $('dupWeekBtn'), resetDayBtn = $('resetDayBtn');
        const streakDaysEl = $('streakDays'), totalChainsEl = $('totalChains'), totalMissedEl = $('totalMissed');
        const toast = $('toast');
        const panelOverlay = $('panelOverlay'), slidePanel = $('slidePanel');
        const menuBtn = $('menuBtn'), panelCloseBtn = $('panelCloseBtn');
        const panelCalBtn = $('panelCalBtn'), panelTodayBtn = $('panelTodayBtn'), panelResetBtn = $('panelResetBtn');
        const motiveModal = $('motiveModal'), motiveEmoji = $('motiveEmoji'), motiveQuote = $('motiveQuote'), motiveSub = $('motiveSub'), motiveCloseBtn = $('motiveCloseBtn');
        const calModal = $('calModal'), calGrid = $('calGrid'), calMonthTitle = $('calMonthTitle');
        const calPrevMonth = $('calPrevMonth'), calNextMonth = $('calNextMonth'), calCloseBtn = $('calCloseBtn');

        let calViewMonth = new Date().getMonth();
        let calViewYear = new Date().getFullYear();

        // Panel
        function openPanel() { panelOverlay.classList.add('show');
            slidePanel.classList.add('show'); }
        function closePanel() { panelOverlay.classList.remove('show');
            slidePanel.classList.remove('show'); }
        menuBtn.addEventListener('click', openPanel);
        panelCloseBtn.addEventListener('click', closePanel);
        panelOverlay.addEventListener('click', closePanel);
        panelTodayBtn.addEventListener('click', () => { viewOffset = 0;
            closePanel();
            renderAll(); });
        panelCalBtn.addEventListener('click', () => { closePanel();
            calModal.classList.add('show');
            renderCalModal(); });
        panelResetBtn.addEventListener('click', () => {
            closePanel();
            if (confirm('Reset ALL progress?')) {
                appData = { wins: 0, impulses: 0, gameHistory: [], tasks: [
                    { id: 1, name: 'Make the bed', start: '07:00', end: '07:05' },
                    { id: 2, name: 'Drink water', start: '07:05', end: '07:10' },
                    { id: 3, name: 'Stretch', start: '07:10', end: '07:30' },
                    { id: 4, name: 'Read 10 pages', start: '20:00', end: '20:30' },
                    { id: 5, name: 'No phone', start: '22:00', end: '06:00' },
                ], completedDays: {}, todayCompleted: {}, nextId: 6, futureTasks: {} };
                localStorage.removeItem('better_me_last_date');
                viewOffset = 0;
                renderAll();
                showToast('All progress reset');
            }
        });

        // Motivation
        const triggers = [
            { emoji: '⚡', q: 'The person you want to become is watching. Don\'t let her see you quit.', sub: 'She\'s counting on you.' },
            { emoji: '🔥', q: 'No one is coming to save you. This is YOUR moment.', sub: 'The chain won\'t close itself.' },
            { emoji: '💎', q: 'Every diamond was once coal under pressure.', sub: 'You\'re being forged right now.' },
            { emoji: '🦅', q: 'While others scroll, you build. While others sleep, you rise.', sub: 'Discipline is your superpower.' },
            { emoji: '🌊', q: 'The tide doesn\'t ask permission. Neither should your greatness.', sub: 'Sweep through this day.' },
            { emoji: '🏔', q: 'The summit is lonely for a reason. Few are willing to climb.', sub: 'You\'ve already started.' },
            { emoji: '⚔️', q: 'Today is a battle between who you are and who you could be.', sub: 'Pick up your sword.' },
            { emoji: '🕯', q: 'In the darkness of distraction, your focus is the only light.', sub: 'Guard it fiercely.' },
            { emoji: '🌿', q: 'You don\'t need motivation. You need to remember who you decided to become.', sub: 'That decision was made.' },
            { emoji: '🔑', q: 'Every completed task is a key to your freedom.', sub: 'Stop giving it away.' },
            { emoji: '🎯', q: 'Average is a choice. Excellence is a choice.', sub: 'Both are made in moments like this.' },
            { emoji: '🦁', q: 'The lion doesn\'t negotiate with the lamb.', sub: 'Your higher self doesn\'t beg.' },
            { emoji: '💫', q: 'One focused day can change the trajectory of your life.', sub: 'Make today that day.' },
            { emoji: '🕊', q: 'Peace comes from knowing you did EVERYTHING.', sub: 'Finish the chain. Then rest.' },
            { emoji: '🌅', q: 'The sun rises on a fresh battlefield.', sub: 'You have 24 hours. Make them count.' },
        ];

        function showMotiveModal() {
            const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
            const t = triggers[dayOfYear % triggers.length];
            motiveEmoji.textContent = t.emoji;
            motiveQuote.textContent = t.q;
            motiveSub.textContent = t.sub;
            motiveModal.classList.add('show');
        }
        motiveCloseBtn.addEventListener('click', () => motiveModal.classList.remove('show'));
        motiveModal.addEventListener('click', (e) => { if (e.target === motiveModal) motiveModal.classList.remove('show'); });

        // Calendar Modal
        function renderCalModal() {
            calMonthTitle.textContent = new Date(calViewYear, calViewMonth).toLocaleString('en', { month: 'long', year: 'numeric' });
            const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
            const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
            const today = getTodayKey();
            let html = '';
            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => html += '<div class="cal-dow">' + d + '</div>');
            for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) html += '<div class="cal-cell other-month"></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const key = calViewYear + '-' + String(calViewMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                let cls = 'cal-cell';
                if (key === today) cls += ' today';
                if (appData.completedDays[key] === true) cls += ' done';
                if (appData.completedDays[key] === false) cls += ' missed';
                html += '<div class="' + cls + '" data-key="' + key + '">' + d + '</div>';
            }
            calGrid.innerHTML = html;
            calGrid.querySelectorAll('.cal-cell').forEach(cell => {
                const key = cell.dataset.key;
                if (!key) return;
                cell.addEventListener('click', () => {
                    const d = new Date(key);
                    const todayD = new Date();
                    viewOffset = Math.round((d - new Date(todayD.getFullYear(), todayD.getMonth(), todayD.getDate())) / 86400000);
                    calModal.classList.remove('show');
                    renderAll();
                });
            });
        }
        calCloseBtn.addEventListener('click', () => calModal.classList.remove('show'));
        calModal.addEventListener('click', (e) => { if (e.target === calModal) calModal.classList.remove('show'); });
        calPrevMonth.addEventListener('click', () => { calViewMonth--;
            if (calViewMonth < 0) { calViewMonth = 11;
                calViewYear--; } renderCalModal(); });
        calNextMonth.addEventListener('click', () => { calViewMonth++;
            if (calViewMonth > 11) { calViewMonth = 0;
                calViewYear++; } renderCalModal(); });

        // Helpers
        function getCompletedCount(key) {
            const tasks = getTasksForKey(key);
            const comp = getCompletedForKey(key);
            return tasks.filter(t => comp[t.id] === true).length;
        }
        function getTasksForKey(key) {
            if (key === getTodayKey()) return appData.tasks;
            if (appData.futureTasks[key]) return appData.futureTasks[key];
            return appData.tasks;
        }
        function getCompletedForKey(key) {
            if (key === getTodayKey()) return appData.todayCompleted;
            if (appData.completedDays[key] === true) {
                const tasks = getTasksForKey(key);
                const obj = {};
                tasks.forEach(t => obj[t.id] = true);
                return obj;
            }
            return {};
        }
        function isAllDoneForKey(key) {
            const tasks = getTasksForKey(key);
            if (tasks.length === 0) return false;
            const comp = getCompletedForKey(key);
            return tasks.every(t => comp[t.id] === true);
        }

        function renderRing() {
            const key = getViewKey();
            const tasks = getTasksForKey(key);
            const done = getCompletedCount(key);
            const total = tasks.length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            ringFill.style.strokeDashoffset = RING_CIRC - (pct / 100) * RING_CIRC;
            ringFill.classList.toggle('complete', pct === 100 && total > 0);
            ringText.textContent = total > 0 ? pct + '%' : '—';
        }

        function renderMiniCal() {
            const days = [];
            const today = new Date();
            for (let i = 6; i >= -7; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                const key = getDateKey(d);
                days.push({
                    key, num: d.getDate(),
                    dow: ['S','M','T','W','T','F','S'][d.getDay()],
                    isToday: i === 0,
                    isSelected: i === viewOffset,
                    status: appData.completedDays[key]
                });
            }
            miniCal.innerHTML = days.map(d => {
                let cls = 'mini-day';
                if (d.isToday) cls += ' today';
                if (d.isSelected) cls += ' selected';
                if (d.status === true) cls += ' done';
                if (d.status === false) cls += ' missed';
                return '<div class="' + cls + '" data-key="' + d.key + '" data-offset="' + (d.isToday ? 0 : (new Date(d.key) - new Date(getTodayKey())) / 86400000) + '"><span>' + d.dow + '</span><span>' + d.num + '</span></div>';
            }).join('');
            miniCal.querySelectorAll('.mini-day').forEach(el => {
                el.addEventListener('click', () => {
                    const key = el.dataset.key;
                    const todayD = new Date();
                    const d = new Date(key);
                    viewOffset = Math.round((d - new Date(todayD.getFullYear(), todayD.getMonth(), todayD.getDate())) / 86400000);
                    renderAll();
                });
            });
        }

        function renderTasks() {
            const key = getViewKey();
            const tasks = getTasksForKey(key);
            const comp = getCompletedForKey(key);
            taskList.innerHTML = '';
            tasks.forEach((t, idx) => {
                const isDone = comp[t.id] === true;
                const div = document.createElement('div');
                div.className = 'task-item' + (isDone ? ' done-item' : '');
                div.draggable = true;
                div.dataset.id = t.id;
                div.innerHTML =
                    '<div class="task-drag">⋮⋮</div>' +
                    '<div class="task-check' + (isDone ? ' done' : '') + '">' + (isDone ? '✓' : '') + '</div>' +
                    '<div class="task-info">' +
                    '<input class="task-name-input-edit" value="' + escapeHtml(t.name) + '" data-id="' + t.id + '" data-field="name">' +
                    '<div class="task-time-row">' +
                    '<input class="task-time-input" value="' + (t.start || '') + '" data-id="' + t.id + '" data-field="start" placeholder="start">' +
                    '<span style="color:#C1C0BD;">–</span>' +
                    '<input class="task-time-input" value="' + (t.end || '') + '" data-id="' + t.id + '" data-field="end" placeholder="end">' +
                    '</div></div>' +
                    '<div class="task-delete" data-id="' + t.id + '">×</div>';
                div.querySelector('.task-check').addEventListener('click', (e) => { e.stopPropagation();
                    toggleTask(t.id); });
                div.querySelector('.task-delete').addEventListener('click', (e) => { e.stopPropagation();
                    deleteTask(t.id); });
                div.querySelectorAll('input').forEach(inp => {
                    inp.addEventListener('click', (e) => e.stopPropagation());
                    inp.addEventListener('input', () => updateTaskField(t.id, inp.dataset.field, inp.value));
                });
                div.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', t.id.toString());
                    div.style.opacity = '0.5'; });
                div.addEventListener('dragend', () => { div.style.opacity = '1'; });
                div.addEventListener('dragover', (e) => { e.preventDefault();
                    div.style.borderTop = '2px solid var(--gold)'; });
                div.addEventListener('dragleave', () => { div.style.borderTop = ''; });
                div.addEventListener('drop', (e) => {
                    e.preventDefault();
                    div.style.borderTop = '';
                    moveTask(parseInt(e.dataTransfer.getData('text/plain')), idx);
                });
                taskList.appendChild(div);
            });
        }

        function escapeHtml(str) { const d = document.createElement('div');
            d.textContent = str; return d.innerHTML; }

        function updateTaskField(id, field, value) {
            const key = getViewKey();
            if (key !== getTodayKey() && !appData.futureTasks[key]) appData.futureTasks[key] = JSON.parse(JSON.stringify(appData.tasks));
            const tasks = getTasksForKey(key);
            const t = tasks.find(t => t.id === id);
            if (t) t[field] = value;
            if (key !== getTodayKey()) appData.futureTasks[key] = tasks;
            else appData.tasks = tasks;
            save();
        }

        function moveTask(fromId, toIdx) {
            const key = getViewKey();
            if (key !== getTodayKey() && !appData.futureTasks[key]) appData.futureTasks[key] = JSON.parse(JSON.stringify(appData.tasks));
            const tasks = getTasksForKey(key);
            const fromIdx = tasks.findIndex(t => t.id === fromId);
            if (fromIdx === -1 || fromIdx === toIdx) return;
            const [moved] = tasks.splice(fromIdx, 1);
            tasks.splice(toIdx, 0, moved);
            if (key !== getTodayKey()) appData.futureTasks[key] = tasks;
            else appData.tasks = tasks;
            save();
            renderAll();
        }

        function toggleTask(id) {
            const key = getViewKey();
            if (key !== getTodayKey()) return;
            appData.todayCompleted[id] = !appData.todayCompleted[id];
            if (isAllDoneForKey(key)) {
                const wasJustCompleted = !appData.completedDays[key];
                appData.completedDays[key] = true;
                if (wasJustCompleted) setTimeout(() => showMotiveModal(), 500);
                showToast('◆ Chain complete!');
            } else {
                if (appData.completedDays[key] === true) appData.completedDays[key] = false;
            }
            save();
            renderAll();
        }

        function deleteTask(id) {
            if (!confirm('Delete this task?')) return;
            const key = getViewKey();
            if (key !== getTodayKey() && !appData.futureTasks[key]) appData.futureTasks[key] = JSON.parse(JSON.stringify(appData.tasks));
            let tasks = getTasksForKey(key);
            tasks = tasks.filter(t => t.id !== id);
            if (key !== getTodayKey()) appData.futureTasks[key] = tasks;
            else { appData.tasks = tasks;
                delete appData.todayCompleted[id]; }
            if (isAllDoneForKey(key)) appData.completedDays[key] = true;
            else if (appData.completedDays[key] === true) appData.completedDays[key] = false;
            save();
            renderAll();
        }

        function addTask() {
            const name = newTaskName.value.trim();
            if (!name) return;
            const key = getViewKey();
            if (key !== getTodayKey() && !appData.futureTasks[key]) appData.futureTasks[key] = JSON.parse(JSON.stringify(appData.tasks));
            const t = { id: appData.nextId, name, start: newTaskStart.value.trim() || '', end: newTaskEnd.value.trim() || '' };
            if (key !== getTodayKey()) appData.futureTasks[key].push(t);
            else appData.tasks.push(t);
            appData.nextId++;
            newTaskName.value = '';
            newTaskStart.value = '';
            newTaskEnd.value = '';
            save();
            renderAll();
        }

        function resetDay() {
            if (!confirm('Reset this day?')) return;
            const key = getViewKey();
            if (key === getTodayKey()) appData.todayCompleted = {};
            appData.completedDays[key] = false;
            save();
            renderAll();
        }

        function dupToToday() {
            const todayKey = getTodayKey();
            if (!appData.futureTasks[todayKey]) appData.futureTasks[todayKey] = JSON.parse(JSON.stringify(appData.tasks));
            showToast('✓ Duplicated to today');
            renderAll();
        }
        function dupToTomorrow() {
            const d = new Date();
            d.setDate(d.getDate() + 1);
            const key = getDateKey(d);
            if (!appData.futureTasks[key]) appData.futureTasks[key] = JSON.parse(JSON.stringify(appData.tasks));
            showToast('✓ Duplicated to tomorrow');
            renderAll();
        }
        function dupToWeek() {
            for (let i = 1; i <= 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const key = getDateKey(d);
                if (!appData.futureTasks[key]) appData.futureTasks[key] = JSON.parse(JSON.stringify(appData.tasks));
            }
            showToast('✓ Duplicated next 7 days');
            renderAll();
        }

        function renderGame() {
            winScoreEl.textContent = appData.wins;
            impulseScoreEl.textContent = appData.impulses;
            const total = appData.wins + appData.impulses;
            if (total > 0) {
                const pct = Math.round((appData.wins / total) * 100);
                winFill.style.width = pct + '%';
                loseFill.style.width = (100 - pct) + '%';
                gameRatio.textContent = appData.wins + ':' + appData.impulses + ' (' + pct + '%)';
            } else {
                winFill.style.width = '50%';
                loseFill.style.width = '50%';
                gameRatio.textContent = '0:0';
            }
        }
        function recordGameAction(type) {
            const text = gameInput.value.trim();
            appData.gameHistory.push({ type, reason: text || (type === 'win' ? 'Did it' : 'Gave in'), ts: Date.now(), date: new Date().toDateString() });
            if (type === 'win') { appData.wins++;
                showToast('◆ Win!'); } else { appData.impulses++;
                showToast('◇ Impulse'); }
            if (appData.gameHistory.length > 300) appData.gameHistory = appData.gameHistory.slice(-300);
            gameInput.value = '';
            save();
            renderAll();
        }

        function calculateStreak() {
            const today = getTodayKey();
            let s = 0;
            if (appData.completedDays[today] === true) {
                s = 1;
                const d = new Date();
                while (true) { d.setDate(d.getDate() - 1); if (appData.completedDays[getDateKey(d)] === true) s++;
                    else break; }
            } else {
                const y = new Date();
                y.setDate(y.getDate() - 1);
                if (appData.completedDays[getDateKey(y)] === true) {
                    s = 1;
                    const d = new Date(y);
                    while (true) { d.setDate(d.getDate() - 1); if (appData.completedDays[getDateKey(d)] === true) s++;
                        else break; }
                }
            }
            return s;
        }

        function updateChainTitle() {
            if (viewOffset === 0) chainTitle.textContent = "Today's Chain";
            else if (viewOffset === -1) chainTitle.textContent = "Yesterday's Chain";
            else if (viewOffset === 1) chainTitle.textContent = "Tomorrow's Chain";
            else {
                const d = new Date();
                d.setDate(d.getDate() + viewOffset);
                chainTitle.textContent = d.toLocaleDateString('en', { weekday: 'long', month: 'short', day: 'numeric' });
            }
        }

        function renderAll() {
            renderGame();
            const key = getViewKey();
            const allDone = isAllDoneForKey(key);
            const total = getTasksForKey(key).length;
            chainStatus.textContent = total === 0 ? 'no tasks' : allDone ? 'complete ◆' : 'incomplete';
            chainStatus.className = 'chain-status ' + (allDone && total > 0 ? 'complete' : 'incomplete');
            streakDaysEl.textContent = calculateStreak();
            totalChainsEl.textContent = Object.values(appData.completedDays).filter(v => v === true).length;
            totalMissedEl.textContent = Object.values(appData.completedDays).filter(v => v === false).length;
            renderRing();
            renderMiniCal();
            renderTasks();
            updateChainTitle();
            save();
        }

        let toastTimer;
        function showToast(msg) {
            clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.className = 'toast';
            requestAnimationFrame(() => toast.classList.add('show'));
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        const todayKey = getTodayKey();
        const lastDate = localStorage.getItem('better_me_last_date');
        if (lastDate !== todayKey) {
            appData.todayCompleted = {};
            if (appData.futureTasks[todayKey]) {
                appData.tasks = appData.futureTasks[todayKey];
                const maxId = Math.max(...appData.tasks.map(t => t.id), appData.nextId - 1);
                appData.tasks.forEach(t => { if (t.id > appData.nextId) t.id = ++maxId; });
                appData.nextId = maxId + 1;
                delete appData.futureTasks[todayKey];
            }
            localStorage.setItem('better_me_last_date', todayKey);
            setTimeout(() => showMotiveModal(), 600);
        }

        gameWinBtn.addEventListener('click', () => recordGameAction('win'));
        gameLoseBtn.addEventListener('click', () => recordGameAction('lose'));
        addTaskBtn.addEventListener('click', addTask);
        newTaskName.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });
        resetDayBtn.addEventListener('click', resetDay);
        dupTodayBtn.addEventListener('click', dupToToday);
        dupTomorrowBtn.addEventListener('click', dupToTomorrow);
        dupWeekBtn.addEventListener('click', dupToWeek);

        renderAll();
    </script>
</body>
</html>
